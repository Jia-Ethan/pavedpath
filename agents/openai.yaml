interface:
  display_name: "PavedPath"
  short_description: "Find lawful, effective, feasible paths for non-code problems."
  default_prompt: "Use PavedPath to identify my real non-code objective, check only the hard legality/feasibility boundaries that affect the route, use Agent Reach first when live public-internet evidence is needed and available, compare official constraints with real-world community evidence and lawful workarounds, then recommend the most lawful, effective, feasible practical path with executable steps."
