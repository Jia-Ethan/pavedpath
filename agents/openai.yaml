interface:
  display_name: "PavedPath"
  short_description: "Find lived-practice-first, effective, feasible paths for non-code problems."
  default_prompt: "Use PavedPath to identify my real non-code objective, search lived practice first with Agent Reach when live public-internet evidence is needed and available, prioritize experience posts, method posts, forum discussions, comments, failure retrospectives, long-term reports, and repeated cross-platform patterns, use official product/price/spec pages only as supporting facts when they affect the route, do not search official policy/rules/tax/customs/legal sources unless I explicitly ask for that, then recommend the most effective feasible practical path with executable steps."
